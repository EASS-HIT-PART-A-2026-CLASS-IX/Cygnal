name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uvx ruff check .
      - run: uvx --from mypy==1.19.1 mypy backend frontend ai_analyst worker scripts --ignore-missing-imports --check-untyped-defs
      - run: uv run --with pytest-cov pytest --cov=backend --cov=frontend --cov=ai_analyst --cov=worker --cov=scripts --cov-report=term-missing
      - name: Start API
        env:
          RATE_LIMIT_PER_MINUTE: 1000
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          for attempt in {1..20}; do
            curl --fail http://127.0.0.1:8000/health && break
            sleep 1
          done
      - run: uvx schemathesis run http://127.0.0.1:8000/openapi.json --checks status_code_conformance,response_schema_conformance --include-method GET --exclude-path /auth/me --phases coverage,fuzzing --max-examples 5 --generation-database :memory:
      - run: uvx --from mkdocs-material mkdocs build --strict
      - run: uv run --with pdoc pdoc backend -o site/api
      - run: uv run --no-sync --with "mcp[cli]>=1.1.0" python -m scripts.mcp_probe
