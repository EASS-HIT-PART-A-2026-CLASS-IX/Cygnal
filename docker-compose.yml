services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./cygnal.db:/app/cygnal.db
    environment:
      - DATABASE_URL=sqlite:///cygnal.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/indicators"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    command: ["uv", "run", "python", "-m", "streamlit", "run", "frontend/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=http://api:8000
